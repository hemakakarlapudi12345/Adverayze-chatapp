services:
  - type: web
    name: chat-app-backend
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
